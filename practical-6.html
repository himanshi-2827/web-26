<!DOCTYPE html>
<html>
<head>
    <title>Scholarship / Seminar Registration Form</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
        }

        h2 {
            text-align: center;
        }

        form {
            width: 65%;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 10px gray;
        }

        fieldset {
            margin-bottom: 15px;
            border-radius: 10px;
            border: 2px solid #6c63ff;
            padding: 15px;
        }

        legend {
            font-weight: bold;
            color: #6c63ff;
        }

        label {
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 5px 0 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        input[type="radio"], input[type="checkbox"] {
            width: auto;
        }

        .btn {
            background: #6c63ff;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-reset {
            background: #ff6b6b;
        }
    </style>
</head>

<body>

<h2>🎓 Scholarship / Seminar Registration Form</h2>

<form>

    <!-- Personal Details -->
    <fieldset>
        <legend>Personal Details</legend>

        <label>Full Name:</label>
        <input type="text" required>

        <label>Father's / Guardian's Name:</label>
        <input type="text">

        <label>Email ID:</label>
        <input type="email" required>

        <label>Mobile Number:</label>
        <input type="tel" required>

        <label>Date of Birth:</label>
        <input type="date">

        <label>Gender:</label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <input type="radio" name="gender"> Other

    </fieldset>

    <!-- Address -->
    <fieldset>
        <legend>Address Details</legend>

        <label>Full Address:</label>
        <textarea rows="3"></textarea>

        <label>City:</label>
        <input type="text">

        <label>State:</label>
        <input type="text">

        <label>Pin Code:</label>
        <input type="number">

    </fieldset>

    <!-- Academic Details -->
    <fieldset>
        <legend>Academic Details</legend>

        <label>Highest Qualification:</label>
        <select>
            <option>--Select--</option>
            <option>10th</option>
            <option>12th</option>
            <option>Diploma</option>
            <option>Undergraduate</option>
            <option>Postgraduate</option>
        </select>

        <label>Institution Name:</label>
        <input type="text">

        <label>Percentage / CGPA:</label>
        <input type="text">

        <label>Year of Passing:</label>
        <input type="number">

    </fieldset>

    <!-- Seminar Selection -->
    <fieldset>
        <legend>Seminar Details</legend>

        <label>Select Seminar Topic:</label>
        <select>
            <option>--Select--</option>
            <option>Artificial Intelligence</option>
            <option>Web Development</option>
            <option>Data Science</option>
            <option>Cyber Security</option>
        </select>

        <label>Mode of Attendance:</label><br>
        <input type="radio" name="mode"> Online
        <input type="radio" name="mode"> Offline

        <br><br>

        <label>Preferred Date:</label>
        <input type="date">

    </fieldset>

    <!-- Scholarship Info -->
    <fieldset>
        <legend>Scholarship Information</legend>

        <label>Applying for Scholarship?</label><br>
        <input type="radio" name="scholarship"> Yes
        <input type="radio" name="scholarship"> No

        <br><br>

        <label>Family Income (per year):</label>
        <input type="number">

        <label>Category:</label>
        <select>
            <option>--Select--</option>
            <option>General</option>
            <option>OBC</option>
            <option>SC</option>
            <option>ST</option>
        </select>

        <label>Upload Required Documents:</label><br>
        <input type="checkbox"> Marksheet
        <input type="checkbox"> ID Proof
        <input type="checkbox"> Income Certificate
        <input type="checkbox"> Passport Photo

    </fieldset>

    <!-- Extra Info -->
    <fieldset>
        <legend>Additional Information</legend>

        <label>Why do you want this scholarship/seminar?</label>
        <textarea rows="4"></textarea>

        <label>Skills / Interests:</label>
        <input type="text">

        <label>Declaration:</label><br>
        <input type="checkbox"> I confirm that the above information is true.

    </fieldset>

    <input type="submit" class="btn" value="Submit">
    <input type="reset" class="btn btn-reset" value="Reset">

</form>

</body>
</html>
